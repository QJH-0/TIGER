# Kaggle T4x2 training config for TIGER-small on MiniLibriMix.
# Expected workflow on Kaggle:
# 1. Raw MiniLibriMix dataset is mounted under /kaggle/input/<your-dataset-name>
# 2. Run DataPreProcess/process_librimix.py to generate JSON indexes into /kaggle/working/DataPreProcess/MiniLibriMix
# 3. Train with this config

# Network config
audionet:
  audionet_name: TIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 4
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2

# Loss config
loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

# Training config
training:
  system: AudioLightningModule
  gpus: [0, 1]
  parallel: ddp
  epochs: 300  # 训练轮数：配合 early_stop 使用；如果收敛慢/想跑满可再增大
  # 梯度累积：在 OOM 需要降低 batch_size 时，用它来近似保持有效 batch。
  # effective_bs ≈ datamodule.data_config.batch_size * accumulate_grad_batches
  accumulate_grad_batches: 4
  # Lightning Trainer precision：推荐 16-mixed（省显存且通常更稳）；显存很富裕也可改 32-true
  precision: 16-mixed
  early_stop:
    # Lightning 训练期只使用验证集，因此 monitor 直接使用 val/loss
    monitor: val/loss
    mode: min
    patience: 20
    verbose: true
  SpeedAug: true  # 速度扰动数据增强（在 System 的 training_step 内生效）；不稳定时可关掉对比

# Optim config
optimizer:
  optim_name: adam
  lr: 1.0e-3          # 学习率：batch_size 变小/累积变大时通常需要更保守
  weight_decay: 1.0e-5  # L2 正则：有助于泛化；过大可能导致欠拟合

# Scheduler config
scheduler:
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 15  # plateau 容忍：太小会频繁降 lr；太大可能降得太晚
    factor: 0.5

# Data config
datamodule:
  data_name: Libri2MixModuleRemix
  data_config:
    # Generated JSON index directories on Kaggle.
    # If you choose a different output directory during preprocessing, update these three paths.
    train_dir: /kaggle/working/DataPreProcess/MiniLibriMix/train
    valid_dir: /kaggle/working/DataPreProcess/MiniLibriMix/val
    test_dir: /kaggle/working/DataPreProcess/MiniLibriMix/test
    n_src: 2
    sample_rate: 16000
    segment: 4.0          # 片段长度（秒）：越长越吃显存/但训练更充分；OOM 就降到 3.0/2.0
    normalize_audio: true # 是否归一化：通常更稳；如发现响度信息有用可再评估
    batch_size: 1         # 每卡 batch：OOM 优先降它，再用 accumulate_grad_batches 补有效 batch
    num_workers: 4
    pin_memory: true
    persistent_workers: true  # DataLoader 常驻 worker：加速但更占资源；若卡住/报错可关

exp:
  exp_name: TIGER-Small-MiniLibriMix-Kaggle-T4x2
