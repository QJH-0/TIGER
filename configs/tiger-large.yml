# Network config
audionet:
  audionet_name: TIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 8
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2

# Loss config
loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

# Training config
training:
  system: AudioLightningModule
  # 调试阶段临时配置：仅使用单张可见 GPU 运行。
  # gpus: [2,3,4,5,6,7,8,9]
  gpus: [0]
  parallel: ddp
  # 调试快速验证：先缩短训练轮数。
  # epochs: 500
  epochs: 5
  early_stop:
    # Lightning 训练期只使用验证集，因此 monitor 直接使用 val/loss
    monitor: val/loss
    mode: min
    patience: 20
    verbose: true
  SpeedAug: False
  
# Optim config
optimizer:
  optim_name: adam
  lr: 0.001
  weight_decay: 0

# Sche config
scheduler: 
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 10
    factor: 0.5

# Data config
datamodule:
  # 当前实验将数据集从 EchoSet 切换到 MiniLibriMix。
  # data_name: EchoSetDataModule
  data_name: Libri2MixModuleRemix
  data_config:
    # train_dir: DataPreProcess/EchoSet/train
    # valid_dir: DataPreProcess/EchoSet/val
    # test_dir: DataPreProcess/EchoSet/test
    train_dir: DataPreProcess/MiniLibriMix/train
    valid_dir: DataPreProcess/MiniLibriMix/val
    test_dir: DataPreProcess/MiniLibriMix/test
    n_src: 2
    sample_rate: 16000
    # 使用更短切片，加快本地 sanity run 速度。
    # segment: 3.0
    segment: 1.0
    normalize_audio: false
    batch_size: 1
    # Windows/本地调试时将 worker 降低，减少数据加载不稳定问题。
    # num_workers: 8
    num_workers: 0
    pin_memory: true
    persistent_workers: false

exp:
  # 使用独立实验名，避免与 EchoSet 的 checkpoint/log 混淆。
  # exp_name: TIGER-EchoSet
  exp_name: TIGER-MiniLibriMix
