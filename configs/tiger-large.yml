# Network config
audionet:
  audionet_name: TIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 8
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2

# Loss config
loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

# Training config
training:
  system: AudioLightningModule
  # 调试阶段临时配置：仅使用单张可见 GPU 运行。
  # gpus: [2,3,4,5,6,7,8,9]
  gpus: [0]
  parallel: ddp
  epochs: 300  # 训练轮数：配合 early_stop 使用；想跑满可再增大
  # 梯度累积：OOM 时先降 batch_size，再用它补有效 batch。
  # effective_bs ≈ datamodule.data_config.batch_size * accumulate_grad_batches
  accumulate_grad_batches: 4
  # Lightning Trainer precision：推荐 16-mixed（省显存）；显存很富裕也可改 32-true
  precision: 16-mixed
  early_stop:
    # Lightning 训练期只使用验证集，因此 monitor 直接使用 val/loss
    monitor: val/loss
    mode: min
    patience: 40
    verbose: true
  SpeedAug: true  # 速度扰动数据增强（在 training_step 内生效）
  
# Optim config
optimizer:
  optim_name: adam
  lr: 1.0e-3          # 学习率：batch 变小/累积变大时通常更保守
  weight_decay: 1.0e-5  # L2 正则：有助于泛化；过大可能欠拟合

# Sche config
scheduler: 
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 15  # plateau 容忍：太小会频繁降 lr
    factor: 0.5

# Data config
datamodule:
  # 当前实验将数据集从 EchoSet 切换到 MiniLibriMix。
  # data_name: EchoSetDataModule
  data_name: Libri2MixModuleRemix
  data_config:
    # train_dir: DataPreProcess/EchoSet/train
    # valid_dir: DataPreProcess/EchoSet/val
    # test_dir: DataPreProcess/EchoSet/test
    train_dir: DataPreProcess/MiniLibriMix/train
    valid_dir: DataPreProcess/MiniLibriMix/val
    test_dir: DataPreProcess/MiniLibriMix/test
    n_src: 2
    sample_rate: 16000
    segment: 3.0          # 片段长度（秒）：越长越吃显存；OOM 就降到 3.0/2.0
    normalize_audio: true # 归一化：通常更稳
    batch_size: 1
    num_workers: 4
    pin_memory: true
    persistent_workers: true  # 若卡住/报错可关掉或把 num_workers 改 0

exp:
  # 使用独立实验名，避免与 EchoSet 的 checkpoint/log 混淆。
  # exp_name: TIGER-EchoSet
  exp_name: TIGER-MiniLibriMix
