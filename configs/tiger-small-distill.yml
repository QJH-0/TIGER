# Local standalone distillation config for TIGER-small on MiniLibriMix-mini.

audionet:
  audionet_name: BinaryTIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 4
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2
    binary_config:
      protect_first_layer: true
      protect_attention: true
      protect_1x1_conv: false
      protect_output_layer: true
      enable_binary_linear: false
      protect_patterns:
        - bandsplit.proj
        - q_proj
        - k_proj
        - v_proj
        - mask_gen
        - istft
        - output

loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

training:
  system: DistillAudioLightningModule
  gpus: [0]
  parallel: ddp
  epochs: 300
  accumulate_grad_batches: 4
  precision: 16-mixed
  early_stop:
    monitor: val/loss
    mode: min
    patience: 40
    verbose: true
  SpeedAug: true

optimizer:
  optim_name: adam
  lr: 1.0e-3
  weight_decay: 1.0e-5

scheduler:
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 15
    factor: 0.5

distillation:
  enabled: true
  teacher_ckpt: Experiments/TIGER-Small-MiniLibriMix-Kaggle-T4x2/best_model.pth
  student_init_ckpt: Experiments/TIGER-Small-Binary-Kaggle-T4x2/best_model.pth
  # 旧版兼容字段：若未启用 lambda_kd_schedule，将采用混合系数 (1-kd_lambda)*task + kd_lambda*kd_loss
  kd_lambda: 0.3
  # 新版：lambda_kd 余弦衰减 (1.0 -> 0.1)，用于 task_loss + lambda_kd*kd_loss
  lambda_kd_schedule: cosine
  lambda_kd_range: [1.0, 0.1]
  n_fft: 640
  hop_length: 160
  # MSSP：低频大 patch，高频小 patch；未配置时会退回到 patch_size 单尺度模式
  low_freq_patch_size: 32
  high_freq_patch_size: 8
  split_freq_bin: 64
  patch_size: 16
  top_k_percent: 0.3
  use_multi_scale: false

datamodule:
  data_name: Libri2MixModuleRemix
  data_config:
    train_dir: DataPreProcess/MiniLibriMix-mini/train
    valid_dir: DataPreProcess/MiniLibriMix-mini/val
    test_dir: DataPreProcess/MiniLibriMix-mini/test
    n_src: 2
    sample_rate: 16000
    segment: 3.0
    normalize_audio: true
    batch_size: 1
    num_workers: 0
    pin_memory: true
    persistent_workers: true

exp:
  exp_name: TIGER-MiniLibriMix-Distill
