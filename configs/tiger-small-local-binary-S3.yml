audionet:
  audionet_name: BinaryTIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 4
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2
    binary_config:
      protect_first_layer: true
      protect_attention: true
      protect_1x1_conv: false
      protect_output_layer: true
      enable_binary_linear: false
      binarize_scope: ["pw"]
      protect_patterns:
        - istft

loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

training:
  system: BinaryAudioLightningModule
  gpus: [0]
  parallel: none
  epochs: 15
  accumulate_grad_batches: 1
  precision: 16-mixed
  binary_stage_epochs:
    activation_warmup: 5
    weight_binarize: 10
  warmup_ckpt: Experiments/TIGER-MiniLibriMix-Local/best_model.pth
  freeze_scope: ["pw"]
  early_stop:
    monitor: val/loss
    mode: min
    patience: 3
    verbose: true
  SpeedAug: false

optimizer:
  optim_name: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

scheduler:
  sche_name: null

datamodule:
  data_name: Libri2MixModuleRemix
  data_config:
    train_dir: DataPreProcess/MiniLibriMix-mini/train
    valid_dir: DataPreProcess/MiniLibriMix-mini/val
    test_dir: DataPreProcess/MiniLibriMix-mini/test
    n_src: 2
    sample_rate: 16000
    segment: 2.0
    normalize_audio: true
    batch_size: 1
    num_workers: 0
    pin_memory: false
    persistent_workers: false

exp:
  exp_name: TIGER-Small-Binary-S3-PW
