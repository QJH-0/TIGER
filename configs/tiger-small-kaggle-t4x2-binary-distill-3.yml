# Kaggle 双 T4：阶段二蒸馏 D3（输出 + 子带联合）
# 数据：完整 MiniLibriMix 索引

audionet:
  audionet_name: BinaryTIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 4
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2
    binary_config:
      protect_first_layer: true
      protect_attention: true
      protect_1x1_conv: false
      protect_output_layer: true
      enable_binary_linear: false
      protect_patterns:
        - bandsplit.proj
        - q_proj
        - k_proj
        - v_proj
        - mask_gen
        - istft
        - output

loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

training:
  system: BinaryDistillAudioLitModule
  gpus: [0, 1]
  parallel: ddp
  epochs: 100
  accumulate_grad_batches: 4
  precision: 16-mixed
  binary_stage_epochs:
    # 蒸馏阶段不做 activation_warmup（已从预训练 checkpoint 出发）
    # 直接进入 finetune 阶段，配合蒸馏损失联合优化
    activation_warmup: 0
    weight_binarize: 0
  early_stop:
    monitor: val/loss
    mode: min
    patience: 20
    verbose: true
  SpeedAug: true

optimizer:
  optim_name: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  param_groups:
    fp32_lr: 5.0e-5
    binary_lr: 1.0e-3

scheduler:
  sche_name: CosineAnnealingLR
  sche_config:
    T_max: 100
    eta_min: 1.0e-4

distillation:
  enabled: true
  kd_type: d3
  teacher_ckpt: /kaggle/working/TIGER/Experiments/TIGER-Small-MiniLibriMix-Kaggle-T4x2/best_model.pth
  student_init_ckpt: /kaggle/working/TIGER/Experiments/TIGER-Small-Binary-B0-Kaggle-T4x2/best_model.pth
  # 蒸馏预热：前 5 epochs 冻结 BinaryConv 权重，仅训练 RSign/RPReLU
  distill_warmup_epochs: 5
  # 损失校准：首 batch 自动 scale 蒸馏损失量级
  loss_calibration: true
  # lambda 余弦退火
  lambda_out_range: [1.0, 0.1]
  lambda_band_range: [1.0, 0.1]
  # STFT 参数（与 TIGER 模型一致）
  n_fft: 640
  hop_length: 160

datamodule:
  data_name: Libri2MixModuleRemix
  data_config:
    train_dir: /kaggle/working/DataPreProcess/MiniLibriMix/train
    valid_dir: /kaggle/working/DataPreProcess/MiniLibriMix/val
    test_dir: /kaggle/working/DataPreProcess/MiniLibriMix/test
    n_src: 2
    sample_rate: 16000
    segment: 3.0
    normalize_audio: true
    batch_size: 1
    num_workers: 4
    pin_memory: true
    persistent_workers: true

exp:
  exp_name: TIGER-Small-Binary-Distill-D3-Kaggle-T4x2
