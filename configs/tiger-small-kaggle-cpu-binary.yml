# Kaggle CPU quick validation config for BinaryTIGER on MiniLibriMix-mini.

audionet:
  audionet_name: BinaryTIGER
  audionet_config:
    out_channels: 128
    in_channels: 256
    num_blocks: 4
    upsampling_depth: 5
    win: 640
    stride: 160
    num_sources: 2
    binary_config:
      protect_first_layer: true
      protect_attention: true
      protect_1x1_conv: false
      protect_output_layer: true
      enable_binary_linear: false
      protect_patterns:
        - bandsplit.proj
        - q_proj
        - k_proj
        - v_proj
        - mask_gen
        - istft

loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

training:
  system: BinaryAudioLightningModule
  gpus: [0]
  parallel: ddp
  epochs: 5
  accumulate_grad_batches: 1
  precision: 16-mixed
  binary_stage_epochs:
    activation_warmup: 1
    weight_binarize: 4
  early_stop:
    monitor: val/loss
    mode: min
    patience: 3
    verbose: true
  SpeedAug: false

optimizer:
  optim_name: adam
  lr: 1.0e-3
  weight_decay: 1.0e-5

scheduler:
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 2
    factor: 0.5

datamodule:
  data_name: Libri2MixModuleRemix
  data_config:
    train_dir: /kaggle/working/DataPreProcess/MiniLibriMix-mini/train
    valid_dir: /kaggle/working/DataPreProcess/MiniLibriMix-mini/val
    test_dir: /kaggle/working/DataPreProcess/MiniLibriMix-mini/test
    n_src: 2
    sample_rate: 16000
    segment: 1.0
    normalize_audio: true
    batch_size: 1
    num_workers: 0
    pin_memory: false
    persistent_workers: false

exp:
  exp_name: TIGER-Small-Binary-Kaggle-CPU-Quick
