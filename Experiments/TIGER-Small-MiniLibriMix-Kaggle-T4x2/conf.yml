audionet:
  audionet_config:
    in_channels: 256
    num_blocks: 4
    num_sources: 2
    out_channels: 128
    stride: 160
    upsampling_depth: 5
    win: 640
  audionet_name: TIGER
datamodule:
  data_config:
    batch_size: 1
    n_src: 2
    normalize_audio: true
    num_workers: 4
    persistent_workers: true
    pin_memory: true
    sample_rate: 16000
    segment: 3.0
    test_dir: /kaggle/working/DataPreProcess/MiniLibriMix/test
    train_dir: /kaggle/working/DataPreProcess/MiniLibriMix/train
    valid_dir: /kaggle/working/DataPreProcess/MiniLibriMix/val
  data_name: Libri2MixModuleRemix
exp:
  exp_name: TIGER-Small-MiniLibriMix-Kaggle-T4x2
loss:
  train:
    config:
      pit_from: pw_mtx
      threshold_byloss: false
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
  val:
    config:
      pit_from: pw_mtx
      threshold_byloss: false
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
main_args:
  batch_size: null
  conf_dir: configs/tiger-small-kaggle-t4x2.yml
  epoch: 130
  exp_dir: /kaggle/working/TIGER/Experiments/TIGER-Small-MiniLibriMix-Kaggle-T4x2
  help: null
  resume: false
  resume_ckpt: null
  segment: null
optimizer:
  lr: 0.001
  optim_name: adam
  weight_decay: 1.0e-05
positional arguments: {}
scheduler:
  sche_config:
    factor: 0.5
    patience: 15
  sche_name: ReduceLROnPlateau
training:
  SpeedAug: true
  accumulate_grad_batches: 4
  early_stop:
    mode: min
    monitor: val/loss
    patience: 40
    verbose: true
  epochs: 130
  gpus:
  - 0
  - 1
  parallel: ddp
  precision: 16-mixed
  system: AudioLightningModule
